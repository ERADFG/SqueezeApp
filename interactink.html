<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteractInk — Anonymous Realtime Board</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000000; color: #e7e9ea; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #202327; border-radius: 9999px; }
        input, textarea { background-color: #000000 !important; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased selection:bg-neutral-800 selection:text-white">

    <div class="max-w-7xl mx-auto flex justify-center min-h-screen">
        
        <header class="w-20 xl:w-64 shrink-0 h-screen sticky top-0 flex flex-col justify-between p-3 border-r border-neutral-800">
            <div class="flex flex-col items-center xl:items-start gap-4">
                <a href="blogs.html" class="p-3 hover:bg-neutral-900 rounded-full inline-flex items-center justify-center transition duration-200">
                    <i data-lucide="feather" class="w-7 h-7 text-white"></i>
                </a>
                
                <nav class="w-full space-y-1">
                    <button class="w-full p-3 hover:bg-neutral-900 rounded-full flex items-center justify-center xl:justify-start gap-4 text-xl font-bold text-white transition duration-200">
                        <i data-lucide="home" class="w-6 h-6"></i>
                        <span class="hidden xl:inline text-base font-medium">Home</span>
                    </button>
                    <button class="w-full p-3 hover:bg-neutral-900 rounded-full flex items-center justify-center xl:justify-start gap-4 text-xl text-neutral-400 hover:text-white transition duration-200">
                        <i data-lucide="hash" class="w-6 h-6"></i>
                        <span class="hidden xl:inline text-base font-medium">Explore</span>
                    </button>
                    <button class="w-full p-3 hover:bg-neutral-900 rounded-full flex items-center justify-center xl:justify-start gap-4 text-xl text-neutral-400 hover:text-white transition duration-200">
                        <i data-lucide="globe" class="w-6 h-6"></i>
                        <span class="hidden xl:inline text-base font-medium">Network Matrix</span>
                    </button>
                </nav>
            </div>
            
            <div class="p-2 flex items-center justify-center xl:justify-start gap-3 rounded-full bg-neutral-900/50 border border-neutral-800 xl:px-4">
                <span class="relative flex h-2 w-2 shrink-0">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="hidden xl:inline text-[11px] text-neutral-400 uppercase tracking-wider font-semibold">Mesh Synced</span>
            </div>
        </header>

        <main class="flex-1 max-w-2xl border-r border-neutral-800 min-h-screen pb-24">
            <div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-neutral-800 p-4 z-40">
                <h2 class="text-xl font-bold tracking-tight text-white">Home</h2>
            </div>

            <section class="p-4 border-b border-neutral-800 flex gap-3">
                <div class="w-10 h-10 rounded-full bg-neutral-800 flex items-center justify-center shrink-0 border border-neutral-700">
                    <i data-lucide="user" class="w-5 h-5 text-neutral-400"></i>
                </div>
                <form id="threadForm" class="flex-1 pt-1">
                    <input type="text" id="threadTitle" placeholder="Thread Subject Direct Path..." required max="100" autocomplete="off"
                           class="w-full bg-transparent text-white text-base font-bold pb-2 focus:outline-none placeholder:text-neutral-600 border-b border-neutral-900 mb-3">
                    <textarea id="threadContent" placeholder="What is happening anonymously?" required rows="3"
                              class="w-full bg-transparent text-white text-sm focus:outline-none placeholder:text-neutral-500 resize-none leading-relaxed"></textarea>
                    
                    <div class="flex justify-between items-center border-t border-neutral-950 pt-3 mt-2">
                        <div class="text-neutral-600 flex gap-4 text-sm">
                            <i data-lucide="shield-check" class="w-4 h-4 text-neutral-500" title="Auto-Tripcode compilation layer active"></i>
                            <span class="text-xs text-neutral-500 hidden sm:inline">Secure Node Broadcast</span>
                        </div>
                        <button type="submit" class="bg-white text-black hover:bg-neutral-200 font-bold px-5 py-2 rounded-full transition duration-200 text-sm cursor-pointer shadow-sm">
                            Post
                        </button>
                    </div>
                </form>
            </section>

            <div id="latestStream" class="divide-y divide-neutral-800"></div>
        </main>

        <aside class="w-80 shrink-0 hidden lg:flex flex-col gap-4 p-4 sticky top-0 h-screen overflow-y-auto">
            <div class="relative w-full flex items-center bg-neutral-900 rounded-full px-4 py-2.5 text-neutral-400 border border-transparent focus-within:border-neutral-700 focus-within:bg-black transition duration-200">
                <i data-lucide="search" class="w-4 h-4 mr-3"></i>
                <input type="text" placeholder="Search Matrix Node..." class="bg-transparent w-full text-xs text-white focus:outline-none placeholder:text-neutral-500">
            </div>

            <section class="bg-neutral-900/40 border border-neutral-800/80 rounded-2xl p-4">
                <h3 class="text-base font-bold text-white mb-4 tracking-tight">Trending Matrix (24H)</h3>
                <div id="trendingStream" class="space-y-4"></div>
            </section>
        </aside>

    </div>

    <div id="threadModal" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-black border border-neutral-800 w-full max-w-xl rounded-2xl h-[85vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-neutral-800 flex justify-between items-center bg-black">
                <div class="flex items-center gap-2 text-xs text-neutral-500 font-medium">
                    <i data-lucide="cpu" class="w-3.5 h-3.5 text-neutral-500"></i>
                    <span id="modalMeta" class="uppercase tracking-wider">Node Directory Reference</span>
                </div>
                <button onclick="closeThreadModal()" class="text-neutral-400 hover:text-white p-1 hover:bg-neutral-900 rounded-full transition cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6" id="modalScrollBody">
                <div class="flex gap-3">
                    <div class="w-10 h-10 rounded-full bg-neutral-800 flex items-center justify-center border border-neutral-700 shrink-0">
                        <i data-lucide="user" class="w-5 h-5 text-neutral-400"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-baseline gap-2 mb-1">
                            <span id="modalTitle" class="font-bold text-white text-base truncate uppercase tracking-wide">Subject Target</span>
                        </div>
                        <p id="modalOpBody" class="text-neutral-200 text-sm leading-relaxed break-words whitespace-pre-wrap"></p>
                    </div>
                </div>

                <div class="border-b border-neutral-800"></div>

                <div id="commentTreeContainer" class="space-y-4"></div>
            </div>

            <div class="p-4 border-t border-neutral-800 bg-black">
                <form id="commentForm" class="flex gap-3 items-center">
                    <div class="w-8 h-8 rounded-full bg-neutral-900 flex items-center justify-center border border-neutral-800 shrink-0">
                        <i data-lucide="corner-down-right" class="w-4 h-4 text-neutral-500"></i>
                    </div>
                    <input type="text" id="commentInput" placeholder="Post your reply... (Use >>ID to interlink node tree)" autocomplete="off" required
                           class="flex-1 bg-transparent text-sm text-white focus:outline-none placeholder:text-neutral-600">
                    <button type="submit" class="bg-white text-black hover:bg-neutral-200 font-bold px-4 py-1.5 rounded-full text-xs transition duration-200 cursor-pointer">
                        Reply
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="hoverPreviewBox" class="absolute bg-neutral-900 border border-neutral-700 text-neutral-200 text-xs p-3 rounded-xl shadow-2xl hidden z-50 max-w-xs pointer-events-none"></div>

    <script>
        const SUPABASE_URL = "https://xdshsodkuyawljzuirqt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkc2hzb2RrdXlhd2xqenVpcnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjkyMTEsImV4cCI6MjA5ODgwNTIxMX0.9ozQK1_Dc6_1hjP7HP-Z0dBcSOT-Ook8riBGabRW2Rs";
        
        let supabaseClient;
        const appState = { threads: {}, comments: {}, activeThreadId: null, userSeed: null };

        window.addEventListener('load', async () => {
            if (!window.supabase) return;
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            initSeedEngine();
            bindEventListeners();
            await fetchInitialData();
            initRealtimeSync();
            renderThreads();
            lucide.createIcons(); // Initialize the icon paths
            setInterval(() => renderThreads(), 30000);
        });

        function initSeedEngine() {
            let seed = localStorage.getItem('ink_private_seed_key');
            if (!seed) {
                seed = [...Array(32)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                localStorage.setItem('ink_private_seed_key', seed);
            }
            appState.userSeed = seed;
        }

        async function generateTripcode(threadId, seedString) {
            const encoder = new TextEncoder();
            const rawBuffer = encoder.encode(threadId + seedString);
            const digestBuffer = await crypto.subtle.digest('SHA-256', rawBuffer);
            const hashArray = Array.from(new Uint8Array(digestBuffer));
            return 'Anon#' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 4);
        }

        async function fetchInitialData() {
            try {
                const { data: threads } = await supabaseClient.from('threads').select('*');
                if (threads) threads.forEach(t => appState.threads[t.id] = t);

                const { data: comments } = await supabaseClient.from('comments').select('*');
                if (comments) {
                    comments.forEach(c => {
                        if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                        appState.comments[c.thread_id][c.id] = c;
                    });
                }
            } catch (err) { console.error(err); }
        }

        function initRealtimeSync() {
            supabaseClient.channel('global-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'threads' }, payload => {
                    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                        appState.threads[payload.new.id] = payload.new;
                    }
                    renderThreads();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        const c = payload.new;
                        if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                        appState.comments[c.thread_id][c.id] = c;
                        if (appState.activeThreadId === c.thread_id) renderCommentTree();
                    }
                    renderThreads();
                })
                .subscribe();
        }

        function bindEventListeners() {
            document.getElementById('threadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('threadTitle');
                const content = document.getElementById('threadContent');
                const id = Math.random().toString(16).substring(2, 10);

                await supabaseClient.from('threads').insert([{ id, title: title.value.trim(), content: content.value.trim(), timestamp: Date.now(), upvotes: 1 }]);
                title.value = ''; content.value = '';
            });

            document.getElementById('commentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('commentInput');
                if (!appState.activeThreadId) return;

                const id = Math.random().toString(16).substring(2, 10);
                const tripcode = await generateTripcode(appState.activeThreadId, appState.userSeed);

                await supabaseClient.from('comments').insert([{ id, thread_id: appState.activeThreadId, tripcode, text: input.value.trim(), timestamp: Date.now() }]);
                await supabaseClient.from('threads').update({ upvotes: (appState.threads[appState.activeThreadId].upvotes || 1) + 1 }).eq('id', appState.activeThreadId);

                input.value = '';
            });
        }

        function renderThreads() {
            const threadList = Object.values(appState.threads);
            const chronological = [...threadList].sort((a, b) => b.timestamp - a.timestamp);
            
            const latestContainer = document.getElementById('latestStream');
            latestContainer.innerHTML = '';
            chronological.forEach(t => latestContainer.appendChild(createThreadElementCard(t)));

            const currentTime = Date.now();
            const trendingContainer = document.getElementById('trendingStream');
            trendingContainer.innerHTML = '';

            const trending = [...threadList]
                .map(t => {
                    const ageInHours = (currentTime - t.timestamp) / (1000 * 60 * 60);
                    const score = ((t.upvotes || 1) + 1) / Math.pow((ageInHours + 2), 1.8);
                    return { ...t, ageInHours, score };
                })
                .filter(t => t.ageInHours <= 24)
                .sort((a, b) => b.score - a.score);

            if (trending.length === 0) {
                trendingContainer.innerHTML = `<div class="text-xs text-neutral-500 py-2">No data spikes mapped lines detected.</div>`;
            } else {
                trending.slice(0, 5).forEach(t => trendingContainer.appendChild(createTrendingElementCard(t)));
            }
            lucide.createIcons();
        }

        function createThreadElementCard(thread) {
            const commentCount = appState.comments[thread.id] ? Object.keys(appState.comments[thread.id]).length : 0;
            const dateStr = new Date(thread.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const card = document.createElement('div');
            card.className = "p-4 hover:bg-neutral-900/40 cursor-pointer transition duration-200 flex gap-3 items-start";
            card.onclick = () => openThreadModal(thread.id);
            card.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-neutral-900 border border-neutral-800 flex items-center justify-center shrink-0">
                    <i data-lucide="layers" class="w-4 h-4 text-neutral-400"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between text-xs text-neutral-500 mb-1">
                        <span class="font-bold text-neutral-300 uppercase tracking-wide truncate max-w-[60%]">${escapeHTML(thread.title)}</span>
                        <span class="font-mono text-[11px]">>>${thread.id} · ${dateStr}</span>
                    </div>
                    <p class="text-neutral-300 text-sm leading-relaxed mb-3 break-words whitespace-pre-wrap">${escapeHTML(thread.content)}</p>
                    <div class="flex items-center gap-6 text-xs text-neutral-500">
                        <span class="flex items-center gap-1.5 hover:text-neutral-300 transition"><i data-lucide="message-square" class="w-4 h-4"></i> ${commentCount}</span>
                        <span class="flex items-center gap-1.5 hover:text-neutral-300 transition"><i data-lucide="zap" class="w-4 h-4"></i> ${thread.upvotes || 1}</span>
                    </div>
                </div>
            `;
            return card;
        }

        function createTrendingElementCard(thread) {
            const card = document.createElement('div');
            card.className = "cursor-pointer p-1 hover:bg-neutral-800/30 rounded-lg transition duration-200";
            card.onclick = () => openThreadModal(thread.id);
            card.innerHTML = `
                <div class="text-[11px] text-neutral-500 font-mono">>>${thread.id} · MATRIX TREND</div>
                <h4 class="font-bold text-sm text-neutral-200 truncate uppercase mt-0.5">${escapeHTML(thread.title)}</h4>
                <div class="text-[11px] text-neutral-500 flex items-center gap-1 mt-1"><i data-lucide="trending-up" class="w-3 h-3"></i> Dynamic Velocity ${(thread.score * 10).toFixed(1)}</div>
            `;
            return card;
        }

        function openThreadModal(tId) {
            appState.activeThreadId = tId;
            const thread = appState.threads[tId];
            if (!thread) return;

            document.getElementById('modalMeta').innerText = `NODE SYSTEM: >>${thread.id} // VERIFIED PIPELINE`;
            document.getElementById('modalTitle').innerText = thread.title;
            document.getElementById('modalOpBody').innerText = thread.content;
            document.getElementById('threadModal').classList.remove('hidden');
            renderCommentTree();
        }

        function closeThreadModal() {
            document.getElementById('threadModal').classList.add('hidden');
            appState.activeThreadId = null;
        }

        function renderCommentTree() {
            const container = document.getElementById('commentTreeContainer');
            container.innerHTML = '';
            const commentsMap = appState.comments[appState.activeThreadId] || {};
            const rawCommentsList = Object.values(commentsMap).sort((a, b) => a.timestamp - b.timestamp);

            if (rawCommentsList.length === 0) {
                container.innerHTML = `<div class="text-xs text-neutral-600 text-center py-6 font-mono">No communication packets linked to this cluster root.</div>`;
                return;
            }

            const commentMapRef = {};
            const treeRootNodes = [];

            rawCommentsList.forEach(c => commentMapRef[c.id] = { ...c, children: [] });
            rawCommentsList.forEach(c => {
                const node = commentMapRef[c.id];
                const match = c.text.match(/^&gt;&gt;([A-Fa-f0-9]{8})/); 
                const rawMatch = c.text.match(/^>>([A-Fa-f0-9]{8})/);
                const targetedParentId = (rawMatch ? rawMatch[1] : null) || (match ? match[1] : null);

                if (targetedParentId && commentMapRef[targetedParentId]) {
                    commentMapRef[targetedParentId].children.push(node);
                } else {
                    treeRootNodes.push(node);
                }
            });

            treeRootNodes.forEach(rootNode => container.appendChild(buildCommentTreeUI(rootNode, 0)));
            setupCrossLinkHoverPreviews();
            lucide.createIcons();
        }

        function buildCommentTreeUI(node, depth) {
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${depth > 0 ? 'ml-4 border-l border-neutral-800 pl-4 mt-3' : 'border-b border-neutral-900 pb-3'}`;
            
            const item = document.createElement('div');
            item.className = "p-3 bg-neutral-950/40 rounded-xl border border-neutral-900 text-sm";
            item.id = `comment-${node.id}`;

            const dateStr = new Date(node.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const linkedProcessedText = parseCrossLinksReferences(escapeHTML(node.text));

            item.innerHTML = `
                <div class="flex justify-between items-center text-xs text-neutral-500 mb-2 border-b border-neutral-900 pb-1">
                    <span class="font-bold text-neutral-300 font-mono bg-neutral-900 px-1.5 py-0.5 rounded">${node.tripcode}</span>
                    <span class="font-mono text-[11px]">${dateStr} [>>${node.id}]</span>
                </div>
                <p class="text-neutral-300 leading-relaxed break-words whitespace-pre-wrap">${linkedProcessedText}</p>
                <div class="flex justify-end mt-2">
                    <button onclick="appendReplyPointer('${node.id}')" class="text-xs text-neutral-500 hover:text-white flex items-center gap-1 font-medium cursor-pointer"><i data-lucide="reply" class="w-3.5 h-3.5"></i> Reply</button>
                </div>
            `;
            wrap.appendChild(item);

            if (node.children && node.children.length > 0) {
                node.children.forEach(child => wrap.appendChild(buildCommentTreeUI(child, depth + 1)));
            }
            return wrap;
        }

        function appendReplyPointer(cId) {
            const input = document.getElementById('commentInput');
            input.value = `>>${cId} ` + input.value;
            input.focus();
        }

        function parseCrossLinksReferences(text) {
            const regex = /&gt;&gt;([A-Fa-f0-9]{8})/g;
            return text.replace(regex, (match, id) => `<a href="#comment-${id}" data-preview-id="${id}" class="text-white underline font-bold cross-link-node">${match}</a>`);
        }

        function setupCrossLinkHoverPreviews() {
            const links = document.querySelectorAll('.cross-link-node');
            const previewBox = document.getElementById('hoverPreviewBox');

            links.forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    const targetId = link.getAttribute('data-preview-id');
                    const commentsMap = appState.comments[appState.activeThreadId] || {};
                    const targetComment = commentsMap[targetId];

                    if (targetComment) {
                        previewBox.innerHTML = `
                            <div class="text-[10px] text-white font-bold mb-1 border-b border-neutral-800 pb-0.5 uppercase font-mono">${targetComment.tripcode} [>>${targetComment.id}]</div>
                            <p class="text-neutral-400 leading-snug">${escapeHTML(targetComment.text)}</p>
                        `;
                        previewBox.classList.remove('hidden');
                        const rect = link.getBoundingClientRect();
                        previewBox.style.left = `${rect.left + window.scrollX}px`;
                        previewBox.style.top = `${rect.top + window.scrollY - previewBox.offsetHeight - 10}px`;
                    }
                });
                link.addEventListener('mouseleave', () => previewBox.classList.add('hidden'));
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' })[m]);
        }
    </script>
</body>
</html>
