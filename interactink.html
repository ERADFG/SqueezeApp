<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteractInk — Anonymous Monochromatic Textboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase CDN Client Stack -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #222222; }
        input, textarea { background-color: #000000 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-mono text-xs antialiased selection:bg-white selection:text-black">

    <!-- Top Navigation Header -->
    <header class="border-b border-neutral-800 bg-black sticky top-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <div class="flex items-center gap-4">
                <a href="blogs.html" class="text-neutral-500 hover:text-white transition-colors no-underline">← index</a>
                <h1 class="text-sm font-bold tracking-widest uppercase">InteractInk</h1>
                <span class="text-[10px] border border-neutral-700 px-2 py-0.5 uppercase tracking-wider font-semibold text-neutral-400">GLOBAL REALTIME MATRIX</span>
            </div>
            <div class="text-[10px] text-neutral-400 font-sans tracking-wide">
                <div id="connectionStatus" class="flex items-center gap-2">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                    <span class="tracking-wider uppercase">ONLINE // GLOBAL SYNC ACTIVE</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Workspace Frame -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-6 flex flex-col lg:flex-row gap-8">
        <div class="flex-1 flex flex-col gap-8 lg:max-w-3xl">
            <!-- Form Shell -->
            <section class="border border-neutral-800 p-5 bg-black">
                <div class="text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-4 border-b border-neutral-800 pb-2">[01] Initialize New Node Pipeline</div>
                <form id="threadForm" class="space-y-4">
                    <input type="text" id="threadTitle" placeholder="THREAD SUBJECT / TOPIC DIRECTORY..." required max="100" autocomplete="off"
                           class="w-full border border-neutral-800 text-white px-3 py-2 focus:outline-none focus:border-white placeholder:text-neutral-700">
                    <textarea id="threadContent" placeholder="INPUT TEXT DATA PACKETS PACKED SECURELY..." required rows="4"
                              class="w-full border border-neutral-800 text-white px-3 py-2 focus:outline-none focus:border-white placeholder:text-neutral-700 resize-none"></textarea>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 pt-1">
                        <span class="text-[10px] text-neutral-500">Auto-Tripcode compilation layer active.</span>
                        <button type="submit" class="w-full sm:w-auto border border-white bg-white text-black font-bold px-4 py-2 hover:bg-black hover:text-white transition-colors cursor-pointer text-[10px] uppercase tracking-wider">Commit Broadcast</button>
                    </div>
                </form>
            </section>

            <!-- Latest Threads Feed -->
            <section class="border border-neutral-800 p-5 bg-black flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b border-neutral-800 pb-2">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-neutral-400">[02] Global Live Stream</h2>
                    <span class="text-[10px] text-neutral-500 tracking-wider" id="latestCount">0 Nodes Detected</span>
                </div>
                <div id="latestStream" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
            </section>
        </div>

        <!-- Trending Sidebar -->
        <aside class="w-full lg:w-80 shrink-0 flex flex-col gap-8">
            <section class="border border-neutral-800 p-5 bg-black sticky top-24 shadow-xl">
                <div class="flex justify-between items-center mb-6 border-b border-neutral-800 pb-2">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-neutral-400">[03] Gravity Decay (24H)</h2>
                </div>
                <div id="trendingStream" class="space-y-3 max-h-[650px] overflow-y-auto pr-1"></div>
            </section>
        </aside>
    </main>

    <!-- Thread Detail Modal -->
    <div id="threadModal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-black border border-neutral-800 w-full max-w-4xl h-[90vh] flex flex-col overflow-hidden">
            <div class="p-5 border-b border-neutral-800 bg-black flex justify-between items-start gap-4">
                <div class="min-w-0">
                    <span id="modalMeta" class="text-[10px] text-neutral-500 block mb-1 tracking-wider uppercase">Thread Reference ID</span>
                    <h3 id="modalTitle" class="text-sm font-bold text-white uppercase tracking-wide break-all">Thread Subject Target</h3>
                </div>
                <button onclick="closeThreadModal()" class="text-neutral-500 hover:text-white font-bold px-2 py-1 cursor-pointer text-sm font-sans">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6" id="modalScrollBody">
                <div id="modalOpBody" class="p-4 border border-neutral-800 bg-black text-neutral-300 border-l-2 border-l-white leading-relaxed break-words whitespace-pre-wrap"></div>
                <div class="space-y-4">
                    <h4 class="text-[10px] font-bold uppercase tracking-widest text-neutral-400 border-b border-neutral-800 pb-2">Discussion Tree Matrix</h4>
                    <div id="commentTreeContainer" class="space-y-3"></div>
                </div>
            </div>
            <div class="p-5 border-t border-neutral-800 bg-black">
                <form id="commentForm" class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="commentInput" placeholder="WRITE REPLY PACKET... (USE >>ID INTER-LINK SYNTAX)" autocomplete="off" required
                           class="flex-1 border border-neutral-800 text-white px-3 py-2 text-xs focus:outline-none focus:border-white placeholder:text-neutral-700">
                    <button type="submit" class="border border-white bg-white text-black font-bold px-5 py-2 hover:bg-black hover:text-white text-xs uppercase tracking-wider transition-colors cursor-pointer">Reply</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Hover Preview Layer -->
    <div id="hoverPreviewBox" class="absolute bg-black border border-white text-neutral-300 text-xs p-4 shadow-2xl hidden z-50 max-w-sm pointer-events-none border-l-4 border-l-white"></div>

    <script>
        // CREDENTIAL CHANNELS RE-MAPPED TO AVOID INTERNAL VARIABLE COLLISIONS
        const SUPABASE_URL = "https://xdshsodkuyawljzuirqt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkc2hzb2RrdXlhd2xqenVpcnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjkyMTEsImV4cCI6MjA5ODgwNTIxMX0.9ozQK1_Dc6_1hjP7HP-Z0dBcSOT-Ook8riBGabRW2Rs";
        
        const supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const appState = { threads: {}, comments: {}, activeThreadId: null, userSeed: null };

        window.addEventListener('DOMContentLoaded', async () => {
            initSeedEngine();
            bindEventListeners();
            await fetchInitialData();
            initRealtimeSync();
            renderThreads();
            setInterval(() => renderThreads(), 30000);
        });

        function initSeedEngine() {
            let seed = localStorage.getItem('ink_private_seed_key');
            if (!seed) {
                seed = [...Array(32)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                localStorage.setItem('ink_private_seed_key', seed);
            }
            appState.userSeed = seed;
        }

        async function generateTripcode(threadId, seedString) {
            const encoder = new TextEncoder();
            const rawBuffer = encoder.encode(threadId + seedString);
            const digestBuffer = await crypto.subtle.digest('SHA-256', rawBuffer);
            const hashArray = Array.from(new Uint8Array(digestBuffer));
            return 'Anon#' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 6);
        }

        async function fetchInitialData() {
            const { data: threads } = await supabaseClient.from('threads').select('*');
            if (threads) threads.forEach(t => appState.threads[t.id] = t);

            const { data: comments } = await supabaseClient.from('comments').select('*');
            if (comments) {
                comments.forEach(c => {
                    if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                    appState.comments[c.thread_id][c.id] = c;
                });
            }
        }

        function initRealtimeSync() {
            supabaseClient.channel('global-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'threads' }, payload => {
                    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                        appState.threads[payload.new.id] = payload.new;
                    }
                    renderThreads();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        const c = payload.new;
                        if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                        appState.comments[c.thread_id][c.id] = c;
                        if (appState.activeThreadId === c.thread_id) renderCommentTree();
                    }
                    renderThreads();
                })
                .subscribe();
        }

        function bindEventListeners() {
            document.getElementById('threadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('threadTitle');
                const content = document.getElementById('threadContent');
                const id = Math.random().toString(16).substring(2, 10);

                await supabaseClient.from('threads').insert([{ id, title: title.value.trim(), content: content.value.trim(), timestamp: Date.now(), upvotes: 1 }]);
                title.value = ''; content.value = '';
            });

            document.getElementById('commentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('commentInput');
                if (!appState.activeThreadId) return;

                const id = Math.random().toString(16).substring(2, 10);
                const tripcode = await generateTripcode(appState.activeThreadId, appState.userSeed);

                await supabaseClient.from('comments').insert([{ id, thread_id: appState.activeThreadId, tripcode, text: input.value.trim(), timestamp: Date.now() }]);
                await supabaseClient.from('threads').update({ upvotes: (appState.threads[appState.activeThreadId].upvotes || 1) + 1 }).eq('id', appState.activeThreadId);

                input.value = '';
            });
        }

        function renderThreads() {
            const threadList = Object.values(appState.threads);
            document.getElementById('latestCount').innerText = `${threadList.length} NODES LOGGED`;

            const chronological = [...threadList].sort((a, b) => b.timestamp - a.timestamp);
            const latestContainer = document.getElementById('latestStream');
            latestContainer.innerHTML = '';
            chronological.forEach(t => latestContainer.appendChild(createThreadElementCard(t)));

            const currentTime = Date.now();
            const trendingContainer = document.getElementById('trendingStream');
            trendingContainer.innerHTML = '';

            const trending = [...threadList]
                .map(t => {
                    const ageInHours = (currentTime - t.timestamp) / (1000 * 60 * 60);
                    const score = ((t.upvotes || 1) + 1) / Math.pow((ageInHours + 2), 1.8);
                    return { ...t, ageInHours, score };
                })
                .filter(t => t.ageInHours <= 24)
                .sort((a, b) => b.score - a.score);

            if (trending.length === 0) {
                trendingContainer.innerHTML = `<div class="text-[10px] text-neutral-600 text-center py-6 border border-neutral-800 uppercase tracking-widest">No activity map lines inside 24H vector matrix</div>`;
            } else {
                trending.forEach((t, i) => trendingContainer.appendChild(createTrendingElementCard(t, i + 1)));
            }
        }

        function createThreadElementCard(thread) {
            const commentCount = appState.comments[thread.id] ? Object.keys(appState.comments[thread.id]).length : 0;
            const dateStr = new Date(thread.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const card = document.createElement('div');
            card.className = "border border-neutral-800 bg-black p-4 cursor-pointer hover:border-neutral-500 transition-colors";
            card.onclick = () => openThreadModal(thread.id);
            card.innerHTML = `
                <div class="flex justify-between items-start gap-4 mb-2">
                    <h3 class="font-bold text-white text-xs uppercase tracking-wide break-all max-w-[75%]">${escapeHTML(thread.title)}</h3>
                    <span class="text-[10px] text-neutral-500 shrink-0 font-mono tracking-tight">${dateStr} [>>${thread.id}]</span>
                </div>
                <p class="text-neutral-400 text-xs line-clamp-2 mb-3 leading-relaxed break-words">${escapeHTML(thread.content)}</p>
                <div class="flex justify-between items-center text-[10px] text-neutral-500 border-t border-neutral-900 pt-2">
                    <span class="text-neutral-400 font-bold">INTERACTIONS: ${thread.upvotes || 1}</span>
                    <span class="border border-neutral-800 px-2 py-0.5 text-white font-mono text-[9px]">REPLIES: ${commentCount}</span>
                </div>
            `;
            return card;
        }

        function createTrendingElementCard(thread, index) {
            const card = document.createElement('div');
            card.className = "border border-neutral-900 hover:border-neutral-700 bg-black p-3 cursor-pointer flex gap-3 items-center transition-colors";
            card.onclick = () => openThreadModal(thread.id);
            card.innerHTML = `
                <span class="text-xs font-bold text-neutral-600 w-4 shrink-0 text-center">${index.toString().padStart(2, '0')}</span>
                <div class="flex-1 min-w-0">
                    <h4 class="font-bold text-white text-xs truncate uppercase tracking-wider mb-1">${escapeHTML(thread.title)}</h4>
                    <div class="flex gap-2 text-[9px] text-neutral-500 uppercase tracking-widest">
                        <span class="text-neutral-300 font-bold">V: ${(thread.score * 10).toFixed(1)}</span>
                        <span>/</span>
                        <span>AGE: ${thread.ageInHours.toFixed(1)}H</span>
                    </div>
                </div>
            `;
            return card;
        }

        function openThreadModal(tId) {
            appState.activeThreadId = tId;
            const thread = appState.threads[tId];
            if (!thread) return;

            document.getElementById('modalMeta').innerText = `NODE DIRECTORY: >>${thread.id} // BROADCAST TIMELOG: ${new Date(thread.timestamp).toLocaleString().toUpperCase()}`;
            document.getElementById('modalTitle').innerText = thread.title;
            document.getElementById('modalOpBody').innerText = thread.content;
            document.getElementById('threadModal').classList.remove('hidden');
            renderCommentTree();
        }

        function closeThreadModal() {
            document.getElementById('threadModal').classList.add('hidden');
            appState.activeThreadId = null;
        }

        function renderCommentTree() {
            const container = document.getElementById('commentTreeContainer');
            container.innerHTML = '';
            const commentsMap = appState.comments[appState.activeThreadId] || {};
            const rawCommentsList = Object.values(commentsMap).sort((a, b) => a.timestamp - b.timestamp);

            if (rawCommentsList.length === 0) {
                container.innerHTML = `<div class="text-[10px] text-neutral-600 text-center py-4 uppercase tracking-wider">No transactional data paths linked.</div>`;
                return;
            }

            const commentMapRef = {};
            const treeRootNodes = [];

            rawCommentsList.forEach(c => commentMapRef[c.id] = { ...c, children: [] });
            rawCommentsList.forEach(c => {
                const node = commentMapRef[c.id];
                const match = c.text.match(/^&gt;&gt;([A-Fa-f0-9]{8})/); 
                const rawMatch = c.text.match(/^>>([A-Fa-f0-9]{8})/);
                const targetedParentId = (rawMatch ? rawMatch[1] : null) || (match ? match[1] : null);

                if (targetedParentId && commentMapRef[targetedParentId]) {
                    commentMapRef[targetedParentId].children.push(node);
                } else {
                    treeRootNodes.push(node);
                }
            });

            treeRootNodes.forEach(rootNode => container.appendChild(buildCommentTreeUI(rootNode, 0)));
            setupCrossLinkHoverPreviews();
        }

        function buildCommentTreeUI(node, depth) {
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${depth > 0 ? 'ml-3 border-l border-neutral-800 pl-3 mt-2' : 'border-b border-neutral-900 pb-3'}`;
            
            const item = document.createElement('div');
            item.className = "border border-neutral-900 bg-black p-3 text-xs";
            item.id = `comment-${node.id}`;

            const dateStr = new Date(node.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const linkedProcessedText = parseCrossLinksReferences(escapeHTML(node.text));

            item.innerHTML = `
                <div class="flex justify-between items-center text-[9px] text-neutral-500 mb-2 border-b border-neutral-900 pb-1.5 uppercase tracking-wider">
                    <span class="font-bold text-white border border-neutral-800 px-1 bg-black">${node.tripcode}</span>
                    <span>${dateStr} <span class="text-neutral-400 select-all ml-1 font-bold">[>>${node.id}]</span></span>
                </div>
                <p class="text-neutral-300 leading-relaxed break-words whitespace-pre-wrap">${linkedProcessedText}</p>
                <div class="flex justify-end mt-2">
                    <button onclick="appendReplyPointer('${node.id}')" class="text-[9px] text-neutral-400 hover:text-white uppercase tracking-widest cursor-pointer font-bold">[REPLY]</button>
                </div>
            `;
            wrap.appendChild(item);

            if (node.children && node.children.length > 0) {
                node.children.forEach(child => wrap.appendChild(buildCommentTreeUI(child, depth + 1)));
            }
            return wrap;
        }

        function appendReplyPointer(cId) {
            const input = document.getElementById('commentInput');
            input.value = `>>${cId} ` + input.value;
            input.focus();
        }

        function parseCrossLinksReferences(text) {
            const regex = /&gt;&gt;([A-Fa-f0-9]{8})/g;
            return text.replace(regex, (match, id) => `<a href="#comment-${id}" data-preview-id="${id}" class="text-white underline font-bold cross-link-node">${match}</a>`);
        }

        function setupCrossLinkHoverPreviews() {
            const links = document.querySelectorAll('.cross-link-node');
            const previewBox = document.getElementById('hoverPreviewBox');

            links.forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    const targetId = link.getAttribute('data-preview-id');
                    const commentsMap = appState.comments[appState.activeThreadId] || {};
                    const targetComment = commentsMap[targetId];

                    if (targetComment) {
                        previewBox.innerHTML = `
                            <div class="text-[9px] text-white font-bold mb-1 border-b border-neutral-800 pb-0.5 uppercase">${targetComment.tripcode} [>>${targetComment.id}]</div>
                            <p class="text-neutral-400 leading-snug">${escapeHTML(targetComment.text)}</p>
                        `;
                        previewBox.classList.remove('hidden');
                        const rect = link.getBoundingClientRect();
                        previewBox.style.left = `${rect.left + window.scrollX}px`;
                        previewBox.style.top = `${rect.top + window.scrollY - previewBox.offsetHeight - 10}px`;
                    }
                });
                link.addEventListener('mouseleave', () => previewBox.classList.add('hidden'));
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' })[m]);
        }
    </script>
</body>
</html>
