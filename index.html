    <script>
        const SUPABASE_URL = "https://xdshsodkuyawljzuirqt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkc2hzb2RrdXlhd2xqenVpcnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjkyMTEsImV4cCI6MjA5ODgwNTIxMX0.9ozQK1_Dc6_1hjP7HP-Z0dBcSOT-Ook8riBGabRW2Rs";
        
        let supabaseClient;
        let attachedImageBase64 = null;

        const appState = { 
            threads: [], 
            comments: {}, 
            commentCounts: {}, 
            activeThreadId: null, 
            userSeed: null, 
            cachedCounts: { threads: 0, comments: 0 },
            currentPage: 1,
            threadsPerPage: 15,
            feedFilter: 'latest' // Options: 'latest' or 'trending'
        };

        window.addEventListener('load', async () => {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                initSeedEngine();
                bindEventListeners();
                await fetchCountAndPage(1);
                initRealtimeSync();
            }
            lucide.createIcons();
        });

        function initSeedEngine() {
            let seed = localStorage.getItem('ink_private_seed_key');
            if (!seed) {
                seed = [...Array(32)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                localStorage.setItem('ink_private_seed_key', seed);
            }
            appState.userSeed = seed;
        }

        async function generateTripcode(threadId, seedString) {
            const encoder = new TextEncoder();
            const rawBuffer = encoder.encode(threadId + seedString);
            const digestBuffer = await crypto.subtle.digest('SHA-256', rawBuffer);
            const hashArray = Array.from(new Uint8Array(digestBuffer));
            return 'Anon#' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 4);
        }

        // Live Lookup User Country Code safely without fake placeholders
        async function getRealUserCountry() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data && data.country_code) {
                    return data.country_code.toLowerCase();
                }
            } catch (e) {
                console.error("Country geolocation check skipped:", e);
            }
            return null;
        }

        // Structure clean layout format wrapper for flag embedding
        function makeFlagHtml(countryCode) {
            if (!countryCode) return '';
            return ` · <img src="https://flagcdn.com/16x12/${countryCode.toLowerCase()}.png" class="author-flag-img" alt="${countryCode} Flag">`;
        }

        function switchFeedFilter(filterType) {
            if (appState.feedFilter === filterType) return;
            appState.feedFilter = filterType;
            
            document.getElementById('tabLatest').classList.toggle('active', filterType === 'latest');
            document.getElementById('tabTrending').classList.toggle('active', filterType === 'trending');
            
            fetchCountAndPage(1);
        }

        async function fetchCountAndPage(pageNumber) {
            document.getElementById('latestStream').innerHTML = `<div class="timeline-indicator">Synchronizing secure handshake...</div>`;
            appState.currentPage = pageNumber;
            
            try {
                const [threadCountRes, commentCountRes] = await Promise.all([
                    supabaseClient.from('threads').select('*', { count: 'exact', head: true }),
                    supabaseClient.from('comments').select('*', { count: 'exact', head: true })
                ]);

                appState.cachedCounts.threads = threadCountRes.count || 0;
                appState.cachedCounts.comments = commentCountRes.count || 0;
                updateGlobalCounterUI();

                const { data: commentIds } = await supabaseClient.from('comments').select('thread_id');
                appState.commentCounts = {};
                if (commentIds) {
                    commentIds.forEach(c => {
                        appState.commentCounts[c.thread_id] = (appState.commentCounts[c.thread_id] || 0) + 1;
                    });
                }

                const fromIndex = (pageNumber - 1) * appState.threadsPerPage;
                const toIndex = fromIndex + appState.threadsPerPage - 1;

                if (appState.feedFilter === 'trending') {
                    // Trending Filter: Past 24 hours calculation weight score windowing
                    const rollingDayCutoff = Date.now() - (24 * 60 * 60 * 1000);
                    const { data: rawThreads } = await supabaseClient.from('threads')
                        .select('*')
                        .gte('timestamp', rollingDayCutoff);

                    let metricsThreads = rawThreads || [];
                    metricsThreads.forEach(t => {
                        const replyMetric = appState.commentCounts[t.id] || 0;
                        t.trendingScore = (t.upvotes || 1) + (replyMetric * 2);
                    });

                    metricsThreads.sort((x, y) => y.trendingScore - x.trendingScore);
                    appState.threads = metricsThreads.slice(fromIndex, toIndex + 1);
                } else {
                    // Default Standard Latest Sorting Configuration
                    const { data: threads } = await supabaseClient.from('threads')
                        .select('*')
                        .order('timestamp', { ascending: false })
                        .order('timestamp', { ascending: false });
                    appState.threads = threads || [];
                }

                renderThreads();
                renderPaginationControls();
            } catch (err) { console.error(err); }
        }

        function renderPaginationControls() {
            const container = document.getElementById('paginationControls');
            const totalItems = appState.feedFilter === 'trending' ? appState.threads.length : appState.cachedCounts.threads;
            const totalPages = Math.ceil(totalItems / appState.threadsPerPage) || 1;
            const current = appState.currentPage;
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `
                <button class="page-btn" ${current === 1 ? 'disabled' : ''} onclick="fetchCountAndPage(${current - 1})">
                    <i data-lucide="chevron-left" style="width:16px; height:16px;"></i>
                </button>
            `;

            const delta = 1; 
            let pages = [];

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= current - delta && i <= current + delta)) {
                    pages.push(i);
                } else if (pages[pages.length - 1] !== '...') {
                    pages.push('...');
                }
            }

            pages.forEach(p => {
                if (p === '...') {
                    html += `<span class="page-ellipsis">...</span>`;
                } else {
                    html += `
                        <button class="page-btn ${p === current ? 'active' : ''}" onclick="fetchCountAndPage(${p})">
                            ${p}
                        </button>
                    `;
                }
            });

            html += `
                <button class="page-btn" ${current === totalPages ? 'disabled' : ''} onclick="fetchCountAndPage(${current + 1})">
                    <i data-lucide="chevron-right" style="width:16px; height:16px;"></i>
                </button>
            `;

            container.innerHTML = html;
            lucide.createIcons();
        }

        function initRealtimeSync() {
            supabaseClient.channel('global-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'threads' }, async payload => {
                    if (payload.eventType === 'INSERT') {
                        appState.cachedCounts.threads++;
                    }
                    updateGlobalCounterUI();
                    if (appState.currentPage === 1 && appState.feedFilter === 'latest') {
                        await fetchCountAndPage(1);
                    } else {
                        renderPaginationControls();
                    }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        const c = payload.new;
                        appState.cachedCounts.comments++;
                        appState.commentCounts[c.thread_id] = (appState.commentCounts[c.thread_id] || 0) + 1;
                        if (appState.activeThreadId === c.thread_id) {
                            if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                            appState.comments[c.thread_id][c.id] = c;
                            renderCommentTree();
                        }
                    }
                    updateGlobalCounterUI();
                    renderThreads();
                })
                .subscribe();
        }

        function updateGlobalCounterUI() {
            document.getElementById('globalPostCount').innerText = appState.cachedCounts.threads + appState.cachedCounts.comments;
        }


        function bindEventListeners() {
    const threadContent = document.getElementById('threadContent');
    const threadCharCounter = document.getElementById('threadCharCounter');
    
    threadContent.addEventListener('input', () => {
        threadCharCounter.innerText = `${threadContent.value.length}/1000`;
    });

    const commentInput = document.getElementById('commentInput');
    const commentCharCounter = document.getElementById('commentCharCounter');
    commentInput.addEventListener('input', () => {
        commentCharCounter.innerText = `${commentInput.value.length}/300`;
    });

    // Removed the File Input listener entirely

    // Cleaned Thread Form Submit
    document.getElementById('threadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const title = document.getElementById('threadTitle');
        const content = document.getElementById('threadContent');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Posting...";

        const { error } = await supabaseClient.from('threads').insert([{ 
            id: Math.random().toString(16).substring(2, 10), 
            title: title.value.trim() || 'Anonymous', 
            content: content.value.trim(), 
            timestamp: Date.now(), 
            upvotes: 1
        }]);

        submitBtn.disabled = false;
        submitBtn.innerText = "Post";

        if (error) {
            console.error("Supabase Error:", error);
            alert("Posting failed: " + error.message);
        } else {
            title.value = '';
            content.value = '';
            document.getElementById('threadCharCounter').innerText = '0/1000';
        }
    });

    // Keep your existing commentForm logic here
}

    // Comment Form Submit Listener (Must be its own separate block)
    document.getElementById('commentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!appState.activeThreadId) return;
        
        const input = document.getElementById('commentInput');
        const { error } = await supabaseClient.from('comments').insert([{
            id: Math.random().toString(16).substring(2, 10),
            thread_id: appState.activeThreadId,
            content: input.value.trim(),
            timestamp: Date.now()
        }]);

        if (!error) {
            input.value = '';
            document.getElementById('commentCharCounter').innerText = '0/300';
        }
    });
}

        async function triggerPostUpvote(event, id) {
            event.stopPropagation();
            try {
                const targetBtn = document.getElementById(`upvoteBtn-${id}`);
                if (targetBtn.classList.contains('upvoted-active')) return;

                const thread = appState.threads.find(t => t.id === id);
                if (!thread) return;

                const nextVotes = (thread.upvotes || 1) + 1;
                await supabaseClient.from('threads').update({ upvotes: nextVotes }).eq('id', id);
                
                thread.upvotes = nextVotes;
                targetBtn.classList.add('upvoted-active');
                targetBtn.querySelector('.upvote-count-label').innerText = nextVotes;
            } catch(err) { console.error(err); }
        }

        function formatTime(ms) {
            const diff = Date.now() - ms;
            if (diff < 60000) return 'Just now';
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return `${mins}m`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h`;
            return new Date(ms).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        }

        function renderThreads() {
    const target = document.getElementById('latestStream');
    if(appState.threads.length === 0) {
        target.innerHTML = `<div class="timeline-indicator">No active matrix broadcasts.</div>`;
        return;
    }
    
    target.innerHTML = appState.threads.map(t => {
        const count = appState.commentCounts[t.id] || 0;
        
        // This checks if the image exists and is not just an empty string
        const imgTag = (t.image && t.image.length > 10) 
            ? `<img class="tweet-media-attachment" src="${t.image}" alt="Attachment" style="max-width: 100%; border-radius: 8px; margin-top: 10px;">` 
            : '';

        return `
            <div class="tweet-card" onclick="openThreadModal('${t.id}')">
                <div class="tweet-main">
                    <div class="tweet-header">
                        <span class="tweet-author">${escapeHTML(t.title)}</span>
                    </div>
                    <p class="tweet-content">${parseBodyContent(t.content)}</p>
                    ${imgTag}
                    <div class="tweet-footer">
                        <span>Comments: ${count}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

        async function openThreadModal(id) {
            appState.activeThreadId = id;
            const thread = appState.threads.find(t => t.id === id);
            if (!thread) return;

            document.getElementById('modalTitle').innerHTML = `<span class="tweet-author">${escapeHTML(thread.title)}</span>` + makeFlagHtml(thread.flag);
            document.getElementById('modalTimestamp').innerText = new Date(thread.timestamp).toLocaleString();
            document.getElementById('modalOpBody').innerHTML = parseBodyContent(thread.content);
            document.getElementById('modalMeta').innerText = `Post Instance Node [${id}]`;
            
            const modalImg = document.getElementById('modalOpImage');
            if (thread.image) {
                modalImg.src = thread.image;
                modalImg.style.display = 'block';
            } else {
                modalImg.style.display = 'none';
                modalImg.src = '';
            }

            document.getElementById('commentTreeContainer').innerHTML = `<div class="timeline-indicator">Streaming tree nodes...</div>`;
            document.getElementById('threadModal').classList.add('active');

            try {
                const { data: comments } = await supabaseClient.from('comments').select('*').eq('thread_id', id).order('timestamp', { ascending: true });
                appState.comments[id] = {};
                if (comments) comments.forEach(c => appState.comments[id][c.id] = c);
                renderCommentTree();
            } catch(e) { console.error(e); }
        }

        function closeThreadModal() {
            document.getElementById('threadModal').classList.remove('active');
            appState.activeThreadId = null;
        }

        function renderCommentTree() {
            const container = document.getElementById('commentTreeContainer');
            const commentsMap = appState.comments[appState.activeThreadId] || {};
            const list = Object.values(commentsMap);

            if(list.length === 0) {
                container.innerHTML = `<div style="color: var(--x-text-muted); text-align: center; font-size: 0.9rem; padding: 16px 0;">Be the first to reply to this node cluster.</div>`;
                return;
            }

            container.innerHTML = list.map(c => `
                <div class="comment-node">
                    <div style="display: flex; flex-direction: column; width: 100%;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px;">
                            <span class="tweet-author-wrapper">
                                <span style="font-weight: 700; color: var(--x-text-main);">${c.tripcode}</span>${makeFlagHtml(c.flag)}
                            </span>
                            <span style="font-family: monospace; color: var(--x-text-muted); font-size: 0.75rem;">>>${c.id}</span>
                        </div>
                        <p style="font-size: 0.95rem; color: var(--x-text-main); line-height: 1.4; word-break: break-words;">${parseBodyContent(c.text)}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
            bindHoverPreviews();
        }

        function parseBodyContent(str) {
            if (!str) return '';
            let html = escapeHTML(str);
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            html = html.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer" class="user-link">${url}</a>`);
            const referenceRegex = /&gt;&gt;([a-f0-9]{8})/g;
            html = html.replace(referenceRegex, (match, targetId) => `<a href="#" class="user-link tree-ref" data-preview-id="${targetId}">${match}</a>`);
            return html;
        }

        function bindHoverPreviews() {
            const previewBox = document.getElementById('hoverPreviewBox');
            const links = document.querySelectorAll('.tree-ref');

            links.forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    const targetId = link.getAttribute('data-preview-id');
                    const commentsMap = appState.comments[appState.activeThreadId] || {};
                    const targetComment = commentsMap[targetId];

                    if (targetComment) {
                        previewBox.innerHTML = `
                            <div style="font-family: monospace; font-size: 11px; color: var(--x-blue); font-weight: bold; margin-bottom: 4px;">${targetComment.tripcode} [>>${targetComment.id}]</div>
                            <p style="color: var(--x-text-main); line-height: 1.4;">${escapeHTML(targetComment.text)}</p>
                        `;
                        previewBox.style.display = 'block';
                        const rect = link.getBoundingClientRect();
                        previewBox.style.left = `${rect.left + window.scrollX}px`;
                        previewBox.style.top = `${rect.top + window.scrollY - previewBox.offsetHeight - 10}px`;
                    }
                });
                link.addEventListener('mouseleave', () => previewBox.style.display = 'none');
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>\"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' })[m]);
        }
    </script>
