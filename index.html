    <script>
        const SUPABASE_URL = "https://xdshsodkuyawljzuirqt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkc2hzb2RrdXlhd2xqenVpcnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjkyMTEsImV4cCI6MjA5ODgwNTIxMX0.9ozQK1_Dc6_1hjP7HP-Z0dBcSOT-Ook8riBGabRW2Rs";
        
        let supabaseClient;
        const appState = { 
            threads: {}, 
            comments: {}, 
            commentCounts: {}, 
            activeThreadId: null, 
            userSeed: null, 
            cachedCounts: { threads: 0, comments: 0 },
            feedFilter: 'latest', 
            currentPage: 1, 
            threadsPerPage: 10 
        };

        window.addEventListener('load', async () => {
            if (!window.supabase) return;
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            initSeedEngine();
            bindEventListeners();
            await fetchInitialData();
            initRealtimeSync();
            renderThreads();
            lucide.createIcons();
            setInterval(() => renderThreads(), 30000);
        });

        function initSeedEngine() {
            let seed = localStorage.getItem('ink_private_seed_key');
            if (!seed) {
                seed = [...Array(32)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                localStorage.setItem('ink_private_seed_key', seed);
            }
            appState.userSeed = seed;
        }

        async function generateTripcode(threadId, seedString) {
            const encoder = new TextEncoder();
            const rawBuffer = encoder.encode(threadId + seedString);
            const digestBuffer = await crypto.subtle.digest('SHA-256', rawBuffer);
            const hashArray = Array.from(new Uint8Array(digestBuffer));
            return 'Anon#' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 4);
        }

        async function fetchInitialData() {
            try {
                // Fetch more limit to allow pagination to work visually
                const { data: threads } = await supabaseClient.from('threads').select('*').order('timestamp', { ascending: false }).limit(100);
                if (threads) threads.forEach(t => appState.threads[t.id] = t);

                const { data: commentIds } = await supabaseClient.from('comments').select('thread_id');
                if (commentIds) {
                    commentIds.forEach(c => {
                        appState.commentCounts[c.thread_id] = (appState.commentCounts[c.thread_id] || 0) + 1;
                    });
                }

                const [threadCountRes, commentCountRes] = await Promise.all([
                    supabaseClient.from('threads').select('*', { count: 'exact', head: true }),
                    supabaseClient.from('comments').select('*', { count: 'exact', head: true })
                ]);

                appState.cachedCounts.threads = threadCountRes.count || 0;
                appState.cachedCounts.comments = commentCountRes.count || 0;
                
                updateGlobalCounterUI();
            } catch (err) { console.error(err); }
        }

        function initRealtimeSync() {
            supabaseClient.channel('global-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'threads' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        appState.threads[payload.new.id] = payload.new;
                        appState.cachedCounts.threads++;
                    } else if (payload.eventType === 'UPDATE') {
                        appState.threads[payload.new.id] = payload.new;
                    }
                    updateGlobalCounterUI();
                    renderThreads();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        const c = payload.new;
                        appState.cachedCounts.comments++;
                        appState.commentCounts[c.thread_id] = (appState.commentCounts[c.thread_id] || 0) + 1;
                        
                        if (appState.activeThreadId === c.thread_id) {
                            if (!appState.comments[c.thread_id]) appState.comments[c.thread_id] = {};
                            appState.comments[c.thread_id][c.id] = c;
                            renderCommentTree();
                        }
                    }
                    updateGlobalCounterUI();
                    renderThreads();
                })
                .subscribe();
        }

        function updateGlobalCounterUI() {
            document.getElementById('globalPostCount').innerText = appState.cachedCounts.threads + appState.cachedCounts.comments;
        }

        function switchFeedFilter(filter) {
            appState.feedFilter = filter;
            appState.currentPage = 1; // Reset to page 1 on filter switch
            
            document.getElementById('tabLatest').className = filter === 'latest' 
                ? 'flex-1 text-center py-3.5 text-white border-b-2 border-emerald-500 transition' 
                : 'flex-1 text-center py-3.5 text-neutral-500 border-b-2 border-transparent hover:bg-neutral-900 hover:text-white transition';
                
            document.getElementById('tabTrending').className = filter === 'trending' 
                ? 'flex-1 text-center py-3.5 text-white border-b-2 border-emerald-500 transition' 
                : 'flex-1 text-center py-3.5 text-neutral-500 border-b-2 border-transparent hover:bg-neutral-900 hover:text-white transition';
                
            renderThreads();
        }

        function changePage(page) {
            appState.currentPage = page;
            renderThreads();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function bindEventListeners() {
            const threadContent = document.getElementById('threadContent');
            const threadCharCounter = document.getElementById('threadCharCounter');
            threadContent.addEventListener('input', () => {
                threadCharCounter.innerText = `${threadContent.value.length}/1000`;
            });

            const commentInput = document.getElementById('commentInput');
            const commentCharCounter = document.getElementById('commentCharCounter');
            commentInput.addEventListener('input', () => {
                commentCharCounter.innerText = `${commentInput.value.length}/300`;
            });

            document.getElementById('threadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('threadTitle');
                const id = Math.random().toString(16).substring(2, 10);
                const parsedTitle = title.value.trim() || 'Anonymous';

                await supabaseClient.from('threads').insert([{ id, title: parsedTitle, content: threadContent.value.trim(), timestamp: Date.now(), upvotes: 1 }]);
                title.value = ''; threadContent.value = '';
                threadCharCounter.innerText = '0/1000';
            });

            document.getElementById('commentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!appState.activeThreadId) return;

                const id = Math.random().toString(16).substring(2, 10);
                const tripcode = await generateTripcode(appState.activeThreadId, appState.userSeed);
                const textVal = commentInput.value.trim();

                await supabaseClient.from('comments').insert([{ id, thread_id: appState.activeThreadId, tripcode, text: textVal, timestamp: Date.now() }]);
                
                if (!appState.comments[appState.activeThreadId]) appState.comments[appState.activeThreadId] = {};
                appState.comments[appState.activeThreadId][id] = { id, thread_id: appState.activeThreadId, tripcode, text: textVal, timestamp: Date.now() };
                
                renderCommentTree();
                commentInput.value = '';
                commentCharCounter.innerText = '0/300';
            });
        }

        function renderThreads() {
            const threadList = Object.values(appState.threads);
            let sorted = [];
            
            // Sorting Logic (Latest vs Trending)
            if (appState.feedFilter === 'trending') {
                sorted = [...threadList].sort((a, b) => {
                    const scoreA = appState.commentCounts[a.id] || 0;
                    const scoreB = appState.commentCounts[b.id] || 0;
                    if (scoreA === scoreB) return b.timestamp - a.timestamp; // Tie breaker
                    return scoreB - scoreA;
                });
            } else {
                sorted = [...threadList].sort((a, b) => b.timestamp - a.timestamp);
            }

            // Pagination Logic
            const startIndex = (appState.currentPage - 1) * appState.threadsPerPage;
            const paginatedList = sorted.slice(startIndex, startIndex + appState.threadsPerPage);
            
            const latestContainer = document.getElementById('latestStream');
            latestContainer.innerHTML = '';
            
            if (paginatedList.length === 0) {
                latestContainer.innerHTML = '<div class="text-neutral-500 text-center py-10 text-sm">No threads found.</div>';
            } else {
                paginatedList.forEach(t => latestContainer.appendChild(createThreadElementCard(t)));
            }

            renderPaginationControls(sorted.length);
            lucide.createIcons();
        }

        function renderPaginationControls(totalItems) {
            const container = document.getElementById('paginationControls');
            const totalPages = Math.ceil(totalItems / appState.threadsPerPage) || 1;
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `<button onclick="changePage(${Math.max(1, appState.currentPage - 1)})" 
                                class="p-2 border border-neutral-800 rounded hover:bg-neutral-900 text-white transition ${appState.currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}" 
                                ${appState.currentPage === 1 ? 'disabled' : ''}>
                            <i data-lucide="chevron-left" class="w-4 h-4"></i>
                        </button>`;
            
            // Generate numbered slides
            for(let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= appState.currentPage - 1 && i <= appState.currentPage + 1)) {
                    html += `<button onclick="changePage(${i})" 
                                     class="w-9 h-9 flex items-center justify-center border border-neutral-800 rounded text-sm transition cursor-pointer 
                                     ${i === appState.currentPage ? 'bg-white text-black font-bold' : 'hover:bg-neutral-900 text-neutral-400'}">
                                ${i}
                             </button>`;
                } else if (i === appState.currentPage - 2 || i === appState.currentPage + 2) {
                    html += `<span class="text-neutral-600 px-1">...</span>`;
                }
            }

            html += `<button onclick="changePage(${Math.min(totalPages, appState.currentPage + 1)})" 
                                class="p-2 border border-neutral-800 rounded hover:bg-neutral-900 text-white transition ${appState.currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}" 
                                ${appState.currentPage === totalPages ? 'disabled' : ''}>
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>`;
            
            container.innerHTML = html;
        }

        function createThreadElementCard(thread) {
            const dateStr = new Date(thread.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dynamicCommentCount = appState.commentCounts[thread.id] || 0;
            const card = document.createElement('div');
            card.className = "p-4 hover:bg-neutral-900/40 cursor-pointer transition duration-200 flex flex-col";
            card.onclick = () => openThreadModal(thread.id);
            
            const processedContent = parseRichTextContent(escapeHTML(thread.content));
            
            card.innerHTML = `
                <div class="flex items-center justify-between text-xs text-neutral-500 mb-1">
                    <span class="font-bold text-neutral-300 uppercase tracking-wide truncate max-w-[70%]">${escapeHTML(thread.title)}</span>
                    <span class="font-mono text-[11px]">>>${thread.id} · ${dateStr}</span>
                </div>
                <div class="text-neutral-300 text-sm leading-relaxed mb-3 break-words whitespace-pre-wrap">${processedContent}</div>
                <div class="flex items-center gap-6 text-xs text-neutral-500">
                    <span class="flex items-center gap-1.5 hover:text-neutral-300 transition"><i data-lucide="message-square" class="w-4 h-4"></i> ${dynamicCommentCount} Replies</span>
                </div>
            `;
            return card;
        }

        async function openThreadModal(tId) {
            appState.activeThreadId = tId;
            const thread = appState.threads[tId];
            if (!thread) return;

            document.getElementById('modalMeta').innerText = `NODE SYSTEM: >>${thread.id} // VERIFIED PIPELINE`;
            document.getElementById('modalTitle').innerText = thread.title;
            document.getElementById('modalOpBody').innerHTML = parseRichTextContent(escapeHTML(thread.content));
            document.getElementById('threadModal').classList.remove('hidden');
            
            document.getElementById('commentTreeContainer').innerHTML = `<div class="text-xs text-neutral-600 text-center py-6 font-mono animate-pulse">Syncing linked node packets...</div>`;
            
            try {
                const { data: comments } = await supabaseClient.from('comments').select('*').eq('thread_id', tId);
                appState.comments[tId] = {};
                if (comments) comments.forEach(c => appState.comments[tId][c.id] = c);
                renderCommentTree();
            } catch (err) { console.error(err); }
        }

        function closeThreadModal() {
            document.getElementById('threadModal').classList.add('hidden');
            appState.activeThreadId = null;
            document.getElementById('commentInput').value = '';
            document.getElementById('commentCharCounter').innerText = '0/300';
        }

        function renderCommentTree() {
            const container = document.getElementById('commentTreeContainer');
            container.innerHTML = '';
            const commentsMap = appState.comments[appState.activeThreadId] || {};
            const rawCommentsList = Object.values(commentsMap).sort((a, b) => a.timestamp - b.timestamp);

            if (rawCommentsList.length === 0) {
                container.innerHTML = `<div class="text-xs text-neutral-600 text-center py-6 font-mono">No communication packets linked to this cluster root.</div>`;
                return;
            }

            const commentMapRef = {};
            const treeRootNodes = [];

            rawCommentsList.forEach(c => commentMapRef[c.id] = { ...c, children: [] });
            rawCommentsList.forEach(c => {
                const node = commentMapRef[c.id];
                const match = c.text.match(/^&gt;&gt;([A-Fa-f0-9]{8})/); 
                const rawMatch = c.text.match(/^>>([A-Fa-f0-9]{8})/);
                const targetedParentId = (rawMatch ? rawMatch[1] : null) || (match ? match[1] : null);

                if (targetedParentId && commentMapRef[targetedParentId]) {
                    commentMapRef[targetedParentId].children.push(node);
                } else {
                    treeRootNodes.push(node);
                }
            });

            treeRootNodes.forEach(rootNode => container.appendChild(buildCommentTreeUI(rootNode, 0)));
            setupCrossLinkHoverPreviews();
            lucide.createIcons();
        }

        function buildCommentTreeUI(node, depth) {
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${depth > 0 ? 'ml-4 border-l border-neutral-800 pl-4 mt-3' : 'border-b border-neutral-900 pb-3'}`;
            
            const item = document.createElement('div');
            item.className = "p-3 bg-neutral-950/40 rounded-xl border border-neutral-900 text-sm";
            item.id = `comment-${node.id}`;

            const dateStr = new Date(node.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const structuralLinkedProcessedText = parseRichTextContent(escapeHTML(node.text));

            item.innerHTML = `
                <div class="flex justify-between items-center text-xs text-neutral-500 mb-2 border-b border-neutral-900 pb-1">
                    <span class="font-bold text-neutral-300 font-mono bg-neutral-900 px-1.5 py-0.5 rounded">${node.tripcode}</span>
                    <span class="font-mono text-[11px]">${dateStr} [>>${node.id}]</span>
                </div>
                <div class="text-neutral-300 leading-relaxed break-words whitespace-pre-wrap">${structuralLinkedProcessedText}</div>
                <div class="flex justify-end mt-2">
                    <button onclick="appendReplyPointer('${node.id}')" class="text-xs text-neutral-500 hover:text-white flex items-center gap-1 font-medium cursor-pointer"><i data-lucide="reply" class="w-3.5 h-3.5"></i> Reply</button>
                </div>
            `;
            wrap.appendChild(item);

            if (node.children && node.children.length > 0) {
                node.children.forEach(child => wrap.appendChild(buildCommentTreeUI(child, depth + 1)));
            }
            return wrap;
        }

        function appendReplyPointer(cId) {
            const input = document.getElementById('commentInput');
            input.value = `>>${cId} ` + input.value;
            document.getElementById('commentCharCounter').innerText = `${input.value.length}/300`;
            input.focus();
        }

        function parseRichTextContent(text) {
            if (!text) return '';
            const nodeCrossRegex = /&gt;&gt;([A-Fa-f0-9]{8})/g;
            text = text.replace(nodeCrossRegex, (match, id) => {
                return `<a href="#comment-${id}" data-preview-id="${id}" class="text-white underline font-bold cross-link-node" onclick="event.stopPropagation();">${match}</a>`;
            });
            const rawUrlRegex = /(https?:\/\/[^\s]+)/g;
            text = text.replace(rawUrlRegex, (url) => {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="user-link" onclick="event.stopPropagation();">${url}</a>`;
            });
            return text;
        }

        function setupCrossLinkHoverPreviews() {
            const links = document.querySelectorAll('.cross-link-node');
            const previewBox = document.getElementById('hoverPreviewBox');

            links.forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    const targetId = link.getAttribute('data-preview-id');
                    const commentsMap = appState.comments[appState.activeThreadId] || {};
                    const targetComment = commentsMap[targetId];

                    if (targetComment) {
                        previewBox.innerHTML = `
                            <div class="text-[10px] text-white font-bold mb-1 border-b border-neutral-800 pb-0.5 uppercase font-mono">${targetComment.tripcode} [>>${targetComment.id}]</div>
                            <p class="text-neutral-400 leading-snug">${escapeHTML(targetComment.text)}</p>
                        `;
                        previewBox.classList.remove('hidden');
                        const rect = link.getBoundingClientRect();
                        previewBox.style.left = `${rect.left + window.scrollX}px`;
                        previewBox.style.top = `${rect.top + window.scrollY - previewBox.offsetHeight - 10}px`;
                    }
                });
                link.addEventListener('mouseleave', () => previewBox.classList.add('hidden'));
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' })[m]);
        }
    </script>
